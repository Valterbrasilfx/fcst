let current=0;
let hits=0;
let miss=0;

const q=document.getElementById("question");
const options=document.getElementById("options");
const feedback=document.getElementById("feedback");
const next=document.getElementById("nextBtn");

function loadQuestion(){

let item=quiz[current];

q.innerText=(current+1)+". "+item.question;

options.innerHTML="";
feedback.style.display="none";
next.style.display="none";

item.options.forEach((op,index)=>{

let btn=document.createElement("button");

btn.className="option";
btn.innerText=op;

btn.onclick=()=>check(index);

options.appendChild(btn);

});

updateBar();

}

function check(choice){

let item=quiz[current];

let btns=document.querySelectorAll(".option");

btns.forEach(b=>b.disabled=true);

if(choice===item.answer){

btns[choice].classList.add("correct");

hits++;

document.getElementById("hits").innerText=hits;

feedback.innerHTML=
"<h3>✅ Correto</h3><p>"+
item.explanations[choice]+
"</p>";

}else{

btns[choice].classList.add("wrong");
btns[item.answer].classList.add("correct");

miss++;

document.getElementById("miss").innerText=miss;

feedback.innerHTML=
"<h3>❌ Errado</h3><p>"+
item.explanations[choice]+
"</p><br><strong>Resposta correta:</strong> "+
item.options[item.answer]+
"<br><br>"+
item.explanations[item.answer];

}

feedback.style.display="block";
next.style.display="block";

}

next.onclick=()=>{

current++;

if(current>=quiz.length){

finish();

}else{

loadQuestion();

}

};

function updateBar(){

let pct=(current/quiz.length)*100;

document.getElementById("bar").style.width=pct+"%";

}

function finish(){

document.querySelector(".card").style.display="none";

let total=hits+miss;

let score=((hits/total)*100).toFixed(1);

document.getElementById("final").innerHTML=
`
<div class="card result">
<h2>Resultado Final</h2>
<p>Acertos: ${hits}</p>
<p>Erros: ${miss}</p>
<p>Aproveitamento: ${score}%</p>
</div>
`;

}

loadQuestion();
</script>
