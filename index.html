<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu de Estudos - Ética OAB</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --primary: #e50914;
            --primary-hover: #b80710;
            --accent: #38b6ff;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .menu-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        header h1 {
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: var(--text-color);
        }

        header p {
            font-size: 0.9rem;
            color: #888;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: #262626;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: block;
        }

        .btn:hover {
            background-color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="menu-container">
    <header>
        <h1>Painel de Ética</h1>
        <p>Selecione o módulo para iniciar</p>
    </header>

    <div class="menu-buttons">
        <!-- Botão 1 -->
        <button class="btn" onclick="window.location.href='SIMULADO1.html'">
           001
        </button>

        <!-- Botão 2 -->
        <button class="btn" onclick="window.location.href='SIMULADO2.html'">
           002
        </button>

        <!-- Botão 3 -->
        <button class="btn" onclick="window.location.href='SIMULADO3.html'">
           003
        </button>

        <!-- Botão 4 -->
        <button class="btn" onclick="window.location.href='SIMULADO4.html'">
           004
        </button>
        <button class="btn" onclick="window.location.href='SIMULADOPROVA2.html'">
            005
        </button>
        <button class="btn" onclick="window.location.href='SIMULADORPROVA1.html'">
            006
        </button>
        <button class="btn" onclick="window.location.href='TRILHAS.html'">
           007
        </button>
    </div>
</div>

</body>
</html>
