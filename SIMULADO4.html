<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Simulado de Revisão - Direito Constitucional</title>

<style>
body{
font-family:Arial;
background:#eef2f7;
margin:20px;
}

.container{
max-width:950px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.questao{
margin:20px 0;
padding:15px;
background:#f8f8f8;
border-left:5px solid #003366;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
background:#003366;
color:white;
border:none;
border-radius:8px;
}

button:hover{
background:#0055aa;
}

.comentario{
display:none;
margin-top:10px;
padding:10px;
background:#eef;
border-radius:6px;
}

.correta{
color:green;
font-weight:bold;
}

.errada{
color:red;
font-weight:bold;
}

#resultado{
display:none;
padding:20px;
margin-top:20px;
background:#ddeeff;
border-radius:10px;
font-size:20px;
}
</style>

</head>

<body>

<div class="container">

<h1 align="center">Simulado de Revisão</h1>

<form id="quiz"></form>

<center>

<button type="button" onclick="corrigir()">Corrigir</button>

<button type="button" onclick="location.reload()">Refazer</button>

</center>

<div id="resultado"></div>

</div>

<script>

const questoes=[

{
p:"1. A Constituição Federal de 1988 é:",
o:["Outorgada e flexível","Promulgada e rígida","Histórica e flexível","Outorgada e sintética"],
c:1,
j:"A CF/88 é promulgada e rígida."
},

{
p:"2. As normas de eficácia limitada:",
o:["Produzem todos os efeitos imediatamente","Nunca podem ser aplicadas","Dependem de regulamentação","Não existem"],
c:2,
j:"Dependem de regulamentação para produzir plenamente seus efeitos."
},

{
p:"3. O Habeas Corpus protege:",
o:["Patrimônio","Liberdade de locomoção","Direito à informação","Meio ambiente"],
c:1,
j:"O HC protege a liberdade de locomoção."
},

{
p:"4. O Mandado de Injunção é utilizado quando:",
o:["Há prisão ilegal","Falta lei regulamentadora","Existe dano ao patrimônio","Há erro em cadastro"],
c:1,
j:"O MI combate a omissão legislativa."
},

{
p:"5. As normas de eficácia contida:",
o:["Nunca produzem efeitos","Dependem sempre de lei","São imediatas, mas podem ser restringidas","Só produzem efeitos após regulamentação"],
c:2,
j:"São autoaplicáveis, porém podem sofrer restrições legais."
},

{
p:"6. A principal diferença entre eficácia plena e limitada é:",
o:["A plena depende de lei","A limitada depende de regulamentação","São iguais","Nenhuma"],
c:1,
j:"A limitada necessita de regulamentação."
},

{
p:"7. A Constituição de 1988 é considerada:",
o:["Analítica","Sintética","Costumeira","Flexível"],
c:0,
j:"A CF/88 trata de diversos assuntos."
},

{
p:"8. A CF/88 é quanto à ideologia:",
o:["Ortodoxa","Eclética","Histórica","Flexível"],
c:1,
j:"Reúne ideias de diferentes correntes."
},

{
p:"9. Direitos fundamentais são:",
o:["Bens protegidos","Instrumentos de proteção","Leis complementares","Decretos"],
c:0,
j:"São os bens jurídicos protegidos."
},

{
p:"10. Garantias fundamentais são:",
o:["Direitos sociais","Mecanismos de proteção","Leis penais","Emendas"],
c:1,
j:"Garantias protegem os direitos."
},

{
p:"11. Os direitos fundamentais são:",
o:["Absolutos","Relativos","Temporários","Revogáveis"],
c:1,
j:"Nenhum direito fundamental é absoluto."
},

{
p:"12. Os direitos fundamentais são:",
o:["Prescritíveis","Imprescritíveis","Temporários","Negociáveis"],
c:1,
j:"Não se perdem pelo tempo."
},

{
p:"13. O Habeas Data serve para:",
o:["Liberdade","Corrigir dados pessoais","Anular lei","Proteger patrimônio"],
c:1,
j:"Permite conhecer ou corrigir dados pessoais."
},

{
p:"14. O Mandado de Segurança protege:",
o:["Direito líquido e certo","Locomoção","Meio ambiente","Patrimônio"],
c:0,
j:"Quando não cabe HC nem HD."
},

{
p:"15. A primeira geração relaciona-se à:",
o:["Igualdade","Liberdade","Fraternidade","Saúde"],
c:1,
j:"Direitos civis e políticos."
},

{
p:"16. A segunda geração relaciona-se à:",
o:["Liberdade","Igualdade","Patrimônio","Nacionalidade"],
c:1,
j:"Direitos sociais."
},

{
p:"17. A terceira geração refere-se à:",
o:["Fraternidade","Liberdade","Igualdade","Voto"],
c:0,
j:"Direitos difusos e coletivos."
},

{
p:"18. Meio ambiente pertence à:",
o:["Primeira geração","Segunda geração","Terceira geração","Quarta geração"],
c:2,
j:"É direito de solidariedade."
},

{
p:"19. Ação Popular pode ser proposta por:",
o:["Qualquer cidadão","Qualquer advogado","Juiz","Promotor apenas"],
c:0,
j:"É um instrumento de cidadania."
},

{
p:"20. O tema mais cobrado em provas é:",
o:["Diferença entre eficácia plena, contida e limitada","Direito Tributário","Direito Penal Militar","Falência"],
c:0,
j:"É um dos assuntos mais frequentes em concursos."
}

];

const quiz=document.getElementById("quiz");

questoes.forEach((q,i)=>{

let html=`<div class="questao"><h3>${q.p}</h3>`;

q.o.forEach((op,j)=>{

html+=`
<label>
<input type="radio" name="q${i}" value="${j}">
${String.fromCharCode(65+j)}) ${op}
</label><br>
`;

});

html+=`<div id="c${i}" class="comentario"></div></div>`;

quiz.innerHTML+=html;

});

function corrigir(){

let acertos=0;
let erros=0;

questoes.forEach((q,i)=>{

let r=document.querySelector("input[name=q"+i+"]:checked");

let c=document.getElementById("c"+i);

c.style.display="block";

if(r && Number(r.value)==q.c){

acertos++;

c.innerHTML="<span class='correta'>✔ Correto!</span><br>"+q.j;

}else{

erros++;

c.innerHTML="<span class='errada'>✘ Errado.</span><br>Resposta correta: <b>"+String.fromCharCode(65+q.c)+"</b><br>"+q.j;

}

});

let nota=((acertos/20)*100).toFixed(1);

document.getElementById("resultado").style.display="block";

document.getElementById("resultado").innerHTML=`
<h2>Resultado</h2>

<p><b>Acertos:</b> ${acertos}</p>

<p><b>Erros:</b> ${erros}</p>

<p><b>Aproveitamento:</b> ${nota}%</p>
`;

window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
