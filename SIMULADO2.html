<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Simulado - Aplicabilidade das Normas Constitucionais</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#eef2f7;
margin:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1,h2{
text-align:center;
color:#0b3d91;
}

.questao{
margin:20px 0;
padding:15px;
border-left:6px solid #0b3d91;
background:#f8f9fc;
}

label{
display:block;
padding:5px;
cursor:pointer;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
border:none;
border-radius:8px;
background:#0b3d91;
color:white;
cursor:pointer;
}

button:hover{
background:#1359c5;
}

#resultado{
display:none;
margin-top:30px;
padding:20px;
background:#eef;
border-radius:10px;
font-size:18px;
}

.correta{
color:green;
font-weight:bold;
}

.errada{
color:red;
font-weight:bold;
}

.comentario{
display:none;
margin-top:10px;
padding:10px;
background:#f0f8ff;
border-radius:8px;
}

.barra{
height:25px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.progresso{
height:100%;
width:0%;
background:green;
color:white;
text-align:center;
line-height:25px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>SIMULADO</h1>
<h2>Aplicabilidade das Normas Constitucionais</h2>

<form id="quiz"></form>

<center>
<button type="button" onclick="corrigir()">Corrigir</button>
<button type="button" onclick="location.reload()">Refazer</button>
</center>

<div id="resultado">

<h2>Resultado</h2>

<p><b>Acertos:</b> <span id="acertos"></span></p>

<p><b>Erros:</b> <span id="erros"></span></p>

<p><b>Aproveitamento:</b> <span id="nota"></span></p>

<div class="barra">
<div class="progresso" id="barra"></div>
</div>

</div>

</div>

<script>

const questoes=[

{
p:"1. Quem elaborou a classificação da aplicabilidade das normas constitucionais?",
o:["Michel Temer","José Afonso da Silva","Alexandre de Moraes","Pedro Lenza"],
c:1,
j:"A classificação em normas de eficácia plena, contida e limitada foi desenvolvida por José Afonso da Silva."
},

{
p:"2. Quantos tipos de eficácia existem nessa classificação?",
o:["2","3","4","5"],
c:1,
j:"São três: plena, contida e limitada."
},

{
p:"3. A norma de eficácia plena possui:",
o:["Aplicação imediata","Aplicação futura","Aplicação parcial","Nenhuma eficácia"],
c:0,
j:"Ela produz todos os seus efeitos desde a promulgação da Constituição."
},

{
p:"4. A norma de eficácia plena depende de lei regulamentadora?",
o:["Sempre","Nunca","Às vezes","Somente por decreto"],
c:1,
j:"Não depende de lei para produzir seus efeitos."
},

{
p:"5. A norma de eficácia contida:",
o:["Nunca produz efeitos","Depende sempre de lei","Tem aplicação imediata","Só vale após regulamentação"],
c:2,
j:"Ela nasce produzindo efeitos imediatamente."
},

{
p:"6. A principal característica da eficácia contida é:",
o:["Pode ser restringida por lei","Nunca pode sofrer restrições","Depende de lei para existir","É revogada automaticamente"],
c:0,
j:"A lei pode limitar o exercício do direito."
},

{
p:"7. O art. 5º, XIII da Constituição é exemplo de norma:",
o:["Plena","Limitada","Contida","Histórica"],
c:2,
j:"A liberdade profissional pode sofrer restrições legais."
},

{
p:"8. A exigência de diploma para determinadas profissões decorre de:",
o:["Norma plena","Norma contida","Norma limitada","Norma histórica"],
c:1,
j:"A lei restringe o exercício da profissão."
},

{
p:"9. A norma de eficácia limitada:",
o:["Produz todos os efeitos imediatamente","Depende de regulamentação","Nunca produz efeitos","É autoexecutável"],
c:1,
j:"Necessita de lei para produzir plenamente seus efeitos."
},

{
p:"10. Enquanto não houver regulamentação, a eficácia da norma limitada é:",
o:["Plena","Reduzida","Inexistente","Absoluta"],
c:1,
j:"Ela não produz plenamente todos os efeitos previstos."
},

{
p:"11. Qual norma precisa de lei para produzir plenamente seus efeitos?",
o:["Plena","Contida","Limitada","Escrita"],
c:2,
j:"A eficácia limitada depende de atuação do legislador."
},

{
p:"12. Qual possui aplicação imediata e não depende de lei?",
o:["Limitada","Plena","Contida","Nenhuma"],
c:1,
j:"A eficácia plena é autoaplicável."
},

{
p:"13. A eficácia contida pode ser restringida por:",
o:["Lei","Costume","Jurisprudência apenas","Doutrina"],
c:0,
j:"A Constituição autoriza restrições legais."
},

{
p:"14. A palavra que melhor resume a eficácia plena é:",
o:["Regulamentação","Completa","Restrita","Parcial"],
c:1,
j:"A norma plena já nasce completa."
},

{
p:"15. A palavra que resume a eficácia limitada é:",
o:["Autoaplicável","Completa","Regulamentação","Imediata"],
c:2,
j:"Ela depende de regulamentação."
},

{
p:"16. A eficácia contida é completa, porém:",
o:["Pode ser reduzida","Nunca muda","Depende de emenda","É provisória"],
c:0,
j:"Pode sofrer limitações previstas em lei."
},

{
p:"17. Qual alternativa está correta?",
o:[
"Plena depende de lei",
"Limitada é imediata",
"Contida pode sofrer restrições legais",
"Nenhuma"
],
c:2,
j:"A característica principal da eficácia contida é admitir restrições legais."
},

{
p:"18. Direitos cuja implementação depende do legislador correspondem a normas:",
o:["Plenas","Contidas","Limitadas","Flexíveis"],
c:2,
j:"Sem regulamentação, a eficácia é incompleta."
},

{
p:"19. Complete: Plena → _______, Contida → ________, Limitada → ________.",
o:[
"Completa / pode restringir / depende de lei",
"Depende de lei / completa / restrita",
"Limitada / plena / contida",
"Imediata / histórica / escrita"
],
c:0,
j:"Esse é o resumo clássico cobrado em concursos."
},

{
p:"20. Em provas, a principal dica para diferenciar as normas é:",
o:[
"Observar se depende de regulamentação",
"Decorar o número do artigo",
"Verificar o tamanho da norma",
"Identificar a origem da Constituição"
],
c:0,
j:"A necessidade (ou não) de regulamentação é o principal critério."
}

];

const quiz=document.getElementById("quiz");

questoes.forEach((q,i)=>{

let html=`<div class="questao"><h3>${q.p}</h3>`;

q.o.forEach((op,j)=>{
html+=`
<label>
<input type="radio" name="q${i}" value="${j}">
${String.fromCharCode(65+j)}) ${op}
</label>
`;
});

html+=`<div class="comentario" id="c${i}"></div></div>`;

quiz.innerHTML+=html;

});

function corrigir(){

let acertos=0;
let erros=0;

questoes.forEach((q,i)=>{

let resp=document.querySelector(`input[name=q${i}]:checked`);
let div=document.getElementById("c"+i);

div.style.display="block";

if(resp && Number(resp.value)===q.c){

acertos++;

div.innerHTML=`<span class="correta">✔ Correto!</span><br>${q.j}`;

}else{

erros++;

div.innerHTML=`<span class="errada">✘ Errado.</span><br>
Resposta correta: <b>${String.fromCharCode(65+q.c)}</b><br>${q.j}`;

}

});

let nota=((acertos/questoes.length)*100).toFixed(1);

document.getElementById("resultado").style.display="block";
document.getElementById("acertos").innerHTML=acertos;
document.getElementById("erros").innerHTML=erros;
document.getElementById("nota").innerHTML=nota+"%";

let barra=document.getElementById("barra");

barra.style.width=nota+"%";
barra.innerHTML=nota+"%";

if(nota>=80){
barra.style.background="green";
}else if(nota>=60){
barra.style.background="orange";
}else{
barra.style.background="red";
}

window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
