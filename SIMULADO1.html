<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulado - Conceito e Classificações da Constituição</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
margin:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h1{
text-align:center;
color:#003366;
}

.questao{
margin-bottom:25px;
padding:15px;
border-left:5px solid #003366;
background:#fafafa;
}

.resultado{
margin-top:30px;
padding:20px;
font-size:20px;
background:#eef;
border-radius:10px;
display:none;
}

.correta{
color:green;
font-weight:bold;
}

.errada{
color:red;
font-weight:bold;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
border:none;
background:#003366;
color:white;
border-radius:8px;
}

button:hover{
background:#0055aa;
}

.comentario{
margin-top:10px;
padding:10px;
background:#eef;
display:none;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>SIMULADO DE DIREITO CONSTITUCIONAL</h1>

<h2>Conceito e Classificações da Constituição</h2>

<form id="quiz"></form>

<center>

<button onclick="corrigir()">Corrigir</button>

<button onclick="location.reload()">Refazer</button>

</center>

<div id="resultado" class="resultado"></div>

</div>

<script>

const questoes=[

{
pergunta:"1. A Constituição é:",
opcoes:[
"Lei complementar",
"Lei fundamental e suprema do Estado",
"Decreto presidencial",
"Lei ordinária"
],
correta:1,
comentario:"A Constituição ocupa o topo do ordenamento jurídico e organiza o Estado."
},

{
pergunta:"2. Todas as leis devem ser compatíveis com:",
opcoes:[
"O Código Civil",
"A Constituição",
"O Código Penal",
"Os decretos"
],
correta:1,
comentario:"Todas as normas devem respeitar a Constituição."
},

{
pergunta:"3. Quanto à origem, a Constituição de 1988 é:",
opcoes:[
"Outorgada",
"Histórica",
"Promulgada",
"Flexível"
],
correta:2,
comentario:"Foi elaborada pelos representantes do povo na Assembleia Constituinte."
},

{
pergunta:"4. Constituição imposta pelo governante é chamada de:",
opcoes:[
"Promulgada",
"Outorgada",
"Dogmática",
"Eclética"
],
correta:1,
comentario:"Outorgada significa imposta sem participação popular."
},

{
pergunta:"5. A Constituição Federal de 1988 é quanto à forma:",
opcoes:[
"Não escrita",
"Escrita",
"Costumeira",
"Consuetudinária"
],
correta:1,
comentario:"Está reunida em um único documento."
},

{
pergunta:"6. Constituição baseada principalmente em costumes é:",
opcoes:[
"Escrita",
"Dogmática",
"Não escrita",
"Analítica"
],
correta:2,
comentario:"É chamada também de costumeira."
},

{
pergunta:"7. A Constituição de 1988 quanto à estabilidade é:",
opcoes:[
"Flexível",
"Semirrígida",
"Rígida",
"Imutável"
],
correta:2,
comentario:"Sua alteração exige procedimento especial."
},

{
pergunta:"8. Constituição alterada como lei comum é:",
opcoes:[
"Rígida",
"Semirrígida",
"Flexível",
"Dogmática"
],
correta:2,
comentario:"Flexível pode ser modificada pelo mesmo procedimento das leis comuns."
},

{
pergunta:"9. Constituição que possui parte rígida e parte flexível é:",
opcoes:[
"Semirrígida",
"Escrita",
"Dogmática",
"Outorgada"
],
correta:0,
comentario:"Parte exige procedimento especial e parte não."
},

{
pergunta:"10. Quanto à extensão, a CF/88 é:",
opcoes:[
"Sintética",
"Analítica",
"Histórica",
"Flexível"
],
correta:1,
comentario:"Trata de muitos assuntos."
},

{
pergunta:"11. Constituição que contém apenas princípios fundamentais é:",
opcoes:[
"Analítica",
"Sintética",
"Eclética",
"Dogmática"
],
correta:1,
comentario:"É mais resumida."
},

{
pergunta:"12. Quanto ao modo de elaboração, a CF/88 é:",
opcoes:[
"Histórica",
"Dogmática",
"Outorgada",
"Consuetudinária"
],
correta:1,
comentario:"Foi elaborada em momento específico."
},

{
pergunta:"13. Constituição formada lentamente ao longo da história é:",
opcoes:[
"Dogmática",
"Histórica",
"Analítica",
"Rígida"
],
correta:1,
comentario:"Resulta da evolução histórica."
},

{
pergunta:"14. Quanto à ideologia, a CF/88 é:",
opcoes:[
"Ortodoxa",
"Eclética",
"Flexível",
"Histórica"
],
correta:1,
comentario:"Reúne diferentes correntes políticas."
},

{
pergunta:"15. Constituição baseada em apenas uma ideologia é:",
opcoes:[
"Eclética",
"Ortodoxa",
"Analítica",
"Promulgada"
],
correta:1,
comentario:"Ortodoxa segue apenas uma corrente ideológica."
},

{
pergunta:"16. Assinale a sequência correta sobre a CF/88:",
opcoes:[
"Outorgada, flexível e sintética",
"Promulgada, escrita e rígida",
"Histórica, não escrita e ortodoxa",
"Semirrígida e costumeira"
],
correta:1,
comentario:"Essas são três das principais características da CF/88."
},

{
pergunta:"17. A Constituição está:",
opcoes:[
"No mesmo nível das leis ordinárias",
"No topo do ordenamento jurídico",
"Abaixo das leis complementares",
"Abaixo dos tratados"
],
correta:1,
comentario:"É a norma suprema."
},

{
pergunta:"18. Uma Emenda Constitucional altera a Constituição porque ela é:",
opcoes:[
"Flexível",
"Rígida",
"Consuetudinária",
"Histórica"
],
correta:1,
comentario:"Sua alteração exige procedimento especial."
},

{
pergunta:"19. A Constituição de 1988 foi elaborada em momento determinado da história. Essa característica corresponde à classificação:",
opcoes:[
"Histórica",
"Dogmática",
"Ortodoxa",
"Sintética"
],
correta:1,
comentario:"Constituições dogmáticas são elaboradas em momento específico."
},

{
pergunta:"20. Assinale a alternativa que reúne todas as classificações da CF/88:",
opcoes:[
"Outorgada, escrita, flexível, sintética, histórica e ortodoxa",
"Promulgada, escrita, rígida, analítica, dogmática e eclética",
"Promulgada, costumeira, flexível, analítica e histórica",
"Outorgada, rígida, sintética, ortodoxa e histórica"
],
correta:1,
comentario:"Essa é exatamente a classificação cobrada em concursos."
}

];

const form=document.getElementById("quiz");

questoes.forEach((q,i)=>{

let html="<div class='questao'>";

html+="<h3>"+q.pergunta+"</h3>";

q.opcoes.forEach((op,j)=>{

html+=`
<label>
<input type="radio" name="q${i}" value="${j}">
${String.fromCharCode(65+j)}) ${op}
</label><br>
`;

});

html+=`<div id="c${i}" class="comentario"></div>`;

html+="</div>";

form.innerHTML+=html;

});

function corrigir(){

let acertos=0;
let erros=0;

questoes.forEach((q,i)=>{

let resposta=document.querySelector("input[name=q"+i+"]:checked");

let div=document.getElementById("c"+i);

div.style.display="block";

if(resposta && Number(resposta.value)==q.correta){

acertos++;

div.innerHTML="<span class='correta'>✔ Correto.</span><br>"+q.comentario;

}else{

erros++;

div.innerHTML="<span class='errada'>✘ Errado.</span><br>Resposta correta: <b>"+String.fromCharCode(65+q.correta)+"</b><br>"+q.comentario;

}

});

let nota=((acertos/questoes.length)*100).toFixed(1);

let res=document.getElementById("resultado");

res.style.display="block";

res.innerHTML=`
<h2>Resultado</h2>

<p><b>Acertos:</b> ${acertos}</p>

<p><b>Erros:</b> ${erros}</p>

<p><b>Aproveitamento:</b> ${nota}%</p>

`;

window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
